<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AutoPager</title>
<style>
  :root {
    --accent: #6366f1;
    --accent-dark: #4f46e5;
    --accent-soft: #eef0ff;
    --border: #e7e9f0;
    --text: #1f2430;
    --text-2: #6b7280;
  }
  * { box-sizing: border-box; }
  body {
    width: 260px;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 13px;
    color: var(--text);
  }
  .panel { padding: 14px; }
  .brand { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .brand-icon { font-size: 18px; }
  .brand-name { font-size: 14.5px; font-weight: 700; }

  .status {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 12px; padding: 10px 12px;
    border-radius: 10px; background: #f6f7fb; border: 1px solid var(--border);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #b7bcc8; flex: none; }
  .dot.active { background: #22c55e; }
  .dot.paused { background: #f59e0b; }
  #statusText { font-size: 12.5px; color: var(--text-2); }

  .row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 2px; border-top: 1px solid var(--border);
  }
  .row:first-of-type { border-top: none; }
  .row-title { font-size: 13px; }

  .switch { position: relative; display: inline-block; width: 36px; height: 20px; cursor: pointer; }
  .switch input { position: absolute; opacity: 0; width: 0; height: 0; }
  .switch-track { position: absolute; inset: 0; background: #d7dae2; border-radius: 999px; transition: background .15s; }
  .switch-thumb { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; box-shadow: 0 1px 3px rgba(0,0,0,.25); transition: transform .15s; }
  .switch input:checked + .switch-track { background: var(--accent); }
  .switch input:checked + .switch-track .switch-thumb { transform: translateX(16px); }

  .actions { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
  button {
    width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--border);
    background: #fff; color: var(--text); cursor: pointer; font-size: 13px; font-weight: 500;
    transition: background .12s ease;
  }
  button:hover { background: #f4f5f9; }
  button:disabled { opacity: .55; cursor: default; }
  button.primary { background: var(--accent); border-color: var(--accent-dark); color: #fff; }
  button.primary:hover { background: var(--accent-dark); }
</style>
</head>
<body>
<div class="panel">
  <div class="brand">
    <span class="brand-icon">📖</span>
    <span class="brand-name">AutoPager</span>
  </div>

  <div class="status">
    <span id="statusDot" class="dot"></span>
    <span id="statusText">正在检测当前页面…</span>
  </div>

  <div class="row">
    <span class="row-title">全局启用</span>
    <label class="switch">
      <input type="checkbox" id="enabledToggle">
      <span class="switch-track"><span class="switch-thumb"></span></span>
    </label>
  </div>

  <div class="actions">
    <button id="loadNowBtn">立即加载下一页</button>
    <button id="excludeSiteBtn">排除当前页面</button>
    <button id="optionsBtn" class="primary">打开设置</button>
  </div>
</div>
<script src="common.js"></script>
<script src="popup.js"></script>
</body>
</html>
